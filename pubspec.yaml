name: be_sober
description: Be Sober – Sobriety tracker with community support.
publish_to: "none"
version: 1.0.0+5

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  flutter_riverpod: ^2.5.1
  go_router: ^14.1.4
  google_fonts: ^6.2.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  image_picker: ^1.1.2
  intl: ^0.19.0
  local_auth: ^2.3.0
  lottie: ^3.1.2
  shimmer: ^3.0.0
  supabase_flutter: ^2.9.0
  purchases_flutter: ^6.30.2
  flutter_dotenv: ^5.1.0
  flutter_svg: ^2.0.10+1
  fl_chart: ^0.68.0
  health: ^10.2.0
  speech_to_text: ^6.6.2
  record: ^5.1.2
  audioplayers: ^6.1.0
  share_plus: ^10.0.2
  pdf: ^3.11.1
  path_provider: ^2.1.4
  flutter_local_notifications: ^17.2.2
  awesome_notifications: ^0.10.0
  timezone: ^0.9.4
  workmanager: ^0.9.0
  home_widget: ^0.7.0
  screenshot: ^3.0.0
  url_launcher: ^6.3.1
  file_picker: ^8.0.0
  image_gallery_saver: ^2.0.3
  uuid: ^4.4.2

dev_dependencies:
  flutter_test:
    sdk: flutter

dependency_overrides:
  # record_linux 0.7.x is not compatible with record_platform_interface 1.5.0
  # and fails compilation even when building for iOS.
  record_linux: ^1.3.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/lottie/confetti.json
    # bundled focus/craving audio files
    - assets/
    
